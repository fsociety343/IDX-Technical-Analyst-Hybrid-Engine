name: Daily Stock Analysis Report

on:
  schedule:
    # Senin-Kamis, Sesi I: 09:00, 09:30, 10:00, 10:30, 11:00, 11:30 WIB
    - cron: '0,30 9-11 * * 1-4'
      timezone: 'Asia/Jakarta'

    # Senin-Kamis, Sesi II: 13:30, 14:00, 14:30, 15:00, 15:30 WIB
    - cron: '0,30 14-15 * * 1-4'
      timezone: 'Asia/Jakarta'
    - cron: '30 13 * * 1-4'
      timezone: 'Asia/Jakarta'

    # Jumat, Sesi I: 09:00, 09:30, 10:00, 10:30, 11:00, 11:30 WIB
    - cron: '0,30 9-10 * * 5'
      timezone: 'Asia/Jakarta'
    - cron: '0,30 11 * * 5'
      timezone: 'Asia/Jakarta'

    # Jumat, Sesi II: 14:00, 14:30, 15:00, 15:30 WIB
    - cron: '0,30 14-15 * * 5'
      timezone: 'Asia/Jakarta'

  workflow_dispatch:

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute Analysis Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python bot_saham.py
