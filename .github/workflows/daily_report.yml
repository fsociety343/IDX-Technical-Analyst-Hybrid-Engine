name: Daily Stock Analysis Report PRO v2

on:
  schedule:
    # Setiap 1 jam saat jam bursa WIB (Senin-Jumat)
    # WIB 09:00-16:00 = UTC 02:00-09:00
    - cron: '0 2-9 * * 1-5'
  workflow_dispatch:

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: |
          mkdir -p data
          touch data/saham_pantauan.txt
          touch data/syariah_stocks.txt
          touch data/syariah_stocks_master.txt

      - name: Debug runtime config
        env:
          RUN_MODE: screener_syariah
          WATCHLIST_FILE: data/saham_pantauan.txt
          SYARIAH_UNIVERSE_FILE: data/syariah_stocks.txt
          SYARIAH_MASTER_FILE: data/syariah_stocks_master.txt
          DES_PDF_LOCAL: data/des_syariah_latest.pdf
          SCREENER_MAX_PRICE: "100"
          SCREENER_ENABLE_AUTO_UPDATE_UNIVERSE: "1"
          ACCOUNT_SIZE: "3000000"
          RISK_PER_TRADE_PCT: "1"
          MAX_STOP_PCT: "5"
          BREAKOUT_BUFFER_PCT: "1"
          BREAKOUT_BUFFER_ABS: "1"
          PULLBACK_EXPIRY_DAYS: "5"
          USE_MARKET_FILTER: "1"
          MARKET_SYMBOL: "^JKSE"
          MOVE_SL_TO_BEP_AT_PCT: "5"
          PARTIAL_TAKE_PROFIT_AT_TP1_PCT: "50"
        run: |
          echo "RUN_MODE=$RUN_MODE"
          echo "WATCHLIST_FILE=$WATCHLIST_FILE"
          echo "SYARIAH_UNIVERSE_FILE=$SYARIAH_UNIVERSE_FILE"
          echo "SYARIAH_MASTER_FILE=$SYARIAH_MASTER_FILE"
          echo "DES_PDF_LOCAL=$DES_PDF_LOCAL"
          echo "SCREENER_MAX_PRICE=$SCREENER_MAX_PRICE"
          echo "SCREENER_ENABLE_AUTO_UPDATE_UNIVERSE=$SCREENER_ENABLE_AUTO_UPDATE_UNIVERSE"
          echo "ACCOUNT_SIZE=$ACCOUNT_SIZE"
          echo "RISK_PER_TRADE_PCT=$RISK_PER_TRADE_PCT"
          echo "MAX_STOP_PCT=$MAX_STOP_PCT"
          echo "BREAKOUT_BUFFER_PCT=$BREAKOUT_BUFFER_PCT"
          echo "BREAKOUT_BUFFER_ABS=$BREAKOUT_BUFFER_ABS"
          echo "PULLBACK_EXPIRY_DAYS=$PULLBACK_EXPIRY_DAYS"
          echo "USE_MARKET_FILTER=$USE_MARKET_FILTER"
          echo "MARKET_SYMBOL=$MARKET_SYMBOL"
          echo "MOVE_SL_TO_BEP_AT_PCT=$MOVE_SL_TO_BEP_AT_PCT"
          echo "PARTIAL_TAKE_PROFIT_AT_TP1_PCT=$PARTIAL_TAKE_PROFIT_AT_TP1_PCT"

      - name: Run stock bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

          RUN_MODE: hybrid
          AI_PROVIDER: off
          ENABLE_AI_INSIGHT: "0"

          WATCHLIST_FILE: data/saham_pantauan.txt
          SYARIAH_UNIVERSE_FILE: data/syariah_stocks.txt
          SYARIAH_MASTER_FILE: data/syariah_stocks_master.txt
          DES_PDF_LOCAL: data/des_syariah_latest.pdf

          SCREENER_LIMIT: "5"
          SCREENER_PERIOD: "6mo"
          SCREENER_INTERVAL: "1d"
          SCREENER_MAX_PRICE: "200"
          SCREENER_MIN_VOLUME_RATIO: "1.5"
          SCREENER_MIN_VALUE_TRADED: "1000000000"
          SCREENER_MIN_RSI: "55"
          SCREENER_BATCH_SIZE: "40"
          SCREENER_DELAY_SECONDS: "1.0"
          SCREENER_ENABLE_AUTO_UPDATE_UNIVERSE: "1"

          MIN_ACCEPTABLE_RR: "1.2"
          ACCOUNT_SIZE: "3000000"
          RISK_PER_TRADE_PCT: "1"
          MAX_STOP_PCT: "5"

          BREAKOUT_BUFFER_PCT: "1"
          BREAKOUT_BUFFER_ABS: "1"
          PULLBACK_EXPIRY_DAYS: "5"
          USE_MARKET_FILTER: "1"
          MARKET_SYMBOL: "^JKSE"
          MOVE_SL_TO_BEP_AT_PCT: "5"
          PARTIAL_TAKE_PROFIT_AT_TP1_PCT: "50"

          INCIDENTAL_ADDITIONS: "BSAI"
          EXCLUDED_CODES: "ALDI,BRAU,CPDW,INSA,MASA,RINA,SIMM,SING,SQBB,TRUE"

          TELEGRAM_PREFIX: "🤖 Screener Syariah PRO v2"
        run: |
          python bot_saham.py
