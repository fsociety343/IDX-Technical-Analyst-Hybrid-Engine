name: Daily Stock Analysis Report PRO v3 Feed

on:
  schedule:
    - cron: '0 2-9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: |
          mkdir -p data
          touch data/saham_pantauan.txt
          touch data/syariah_stocks.txt
          touch data/syariah_stocks_master.txt
          touch data/latest_screener.json

      - name: Run stock bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

          RUN_MODE: hybrid
          TRADING_STYLE: scalping
          AI_PROVIDER: off
          ENABLE_AI_INSIGHT: "0"

          WATCHLIST_FILE: data/saham_pantauan.txt
          SYARIAH_UNIVERSE_FILE: data/syariah_stocks.txt
          SYARIAH_MASTER_FILE: data/syariah_stocks_master.txt
          DES_PDF_LOCAL: data/des_syariah_latest.pdf
          SCREENER_JSON_OUTPUT: data/latest_screener.json

          SCREENER_LIMIT: "5"
          SCREENER_PERIOD: "6mo"
          SCREENER_INTERVAL: "1d"
          SCREENER_MAX_PRICE: "200"
          SCREENER_MIN_VOLUME_RATIO: "1.5"
          SCREENER_MIN_VALUE_TRADED: "1000000000"
          SCREENER_MIN_RSI: "55"
          SCREENER_BATCH_SIZE: "40"
          SCREENER_DELAY_SECONDS: "1.0"
          SCREENER_ENABLE_AUTO_UPDATE_UNIVERSE: "1"

          MIN_ACCEPTABLE_RR: "1.5"
          ACCOUNT_SIZE: "3000000"
          RISK_PER_TRADE_PCT: "1"
          MAX_STOP_PCT: "5"

          BREAKOUT_BUFFER_PCT: "1"
          BREAKOUT_BUFFER_ABS: "1"
          PULLBACK_EXPIRY_DAYS: "5"
          USE_MARKET_FILTER: "1"
          MARKET_SYMBOL: "^JKSE"
          MOVE_SL_TO_BEP_AT_PCT: "5"
          PARTIAL_TAKE_PROFIT_AT_TP1_PCT: "50"

          INCIDENTAL_ADDITIONS: "BSAI"
          EXCLUDED_CODES: "ALDI,BRAU,CPDW,INSA,MASA,RINA,SIMM,SING,SQBB,TRUE"

          TELEGRAM_PREFIX: "🤖 Screener Syariah PRO v3 Feed"
        run: |
          python bot_saham.py

      - name: Commit latest screener feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/latest_screener.json data/syariah_stocks.txt data/syariah_stocks_master.txt

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update latest screener feed [skip ci]"
            git push
          fi
